name: CI & Release


# Single pipeline: the `quality` gate (typecheck / lint / test / build) must pass
# before the `release` job (changepacks) is allowed to run — enforced via `needs`.
#
# changepacks-driven npm publishing:
# On a pull request: the `release` job's changepacks/action posts/updates a
# comment summarising the pending changepacks (which packages will bump).
# On push to main:
# - if changepack logs (.changepacks/changepack_log_*.json) are pending, the
#   action opens/updates a "Update Versions" PR that runs `changepacks update`;
# - once that PR is merged (logs consumed), the action publishes the bumped
#   packages to npm (publish: true) and creates GitHub releases + tags.
#
# Uses NPM Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Configure each package on npmjs.com: package Settings > Trusted Publishers.


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


permissions:
  contents: write
  pull-requests: write
  id-token: write


concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: false


jobs:
  quality:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7


      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"


      - name: Install dependencies
        run: bun install --frozen-lockfile


      - name: Typecheck
        run: bun run typecheck


      - name: Lint
        run: bun run lint


      - name: Test
        run: bun test


      - name: Build
        run: bun run build


  release:
    name: changepacks (version PR / publish)
    # Gate: release runs ONLY if the quality job fully passed.
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # changepacks detects changes from git history — needs the full tree.
          fetch-depth: 0


      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"


      # npm (not bun) does the actual publish: bun cannot perform the npm OIDC
      # token exchange (oven-sh/bun#15601). Trusted Publishing needs npm >= 11.5.1.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"


      - name: Ensure npm >= 11.5.1 (OIDC Trusted Publishing)
        # Node 24.0.0 bundles npm 11.3.0 (too old); force a version with OIDC support.
        run: npm install -g npm@latest


      - name: Install dependencies
        # NOT --frozen-lockfile: the "Update Versions" PR bumps each package.json
        # `version` but does not re-sync bun.lock, so a frozen install would fail.
        # Publishing no longer trusts the lockfile for workspace:* resolution —
        # scripts/publish-oidc.sh resolves it from the live package.json files —
        # so this install only needs to provide deps for the build step below.
        run: bun install


      - name: Build (produce dist/ for publish)
        run: bun run build


      - name: Changepacks
        # Publishing is delegated to scripts/publish-oidc.sh (resolve workspace:*
        # from live package.json -> npm pack -> npm publish <tarball>) via
        # .changepacks/config.json, so npm's OIDC Trusted Publishing is used.
        # Provenance is generated automatically under OIDC — no NPM_TOKEN and no
        # --provenance flag needed.
        uses: changepacks/action@main
        id: changepacks
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          publish: true
